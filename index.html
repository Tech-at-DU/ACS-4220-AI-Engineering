<!DOCTYPE html>
<html lang="en">
  <head>
    <!-- UPDATE: Add description, author, og:site_name, og:title, and og:description text for your course. -->
    <!-- NOTE: Text presented in ALL_CAPS indicate values you should replace. -->
    <title>Syllabus Template</title>
    <meta name="description"
      content="This course treats AI engineering like a real job. You ship real work with tools that think, plan, and execute alongside you every day. You'll build, debug, and deploy using Claude Code and workflows professional engineers use right now. By the end, you've practiced the full development loop — writing instructions machines can follow, managing what your tools know, running parallel workers. We're skipping the lectures and going straight to building.">
    <meta name="author" content="Dani Roxberry (danielle.roxberry@dominican.edu)">
    <meta property="og:site_name" content="ACS 4220: AI Engineering">
    <meta property="og:title" content="ACS 4220: AI Engineering">
    <meta property="og:description"
      content="This course treats AI engineering like a real job. You ship real work with tools that think, plan, and execute alongside you every day. You'll build, debug, and deploy using Claude Code and workflows professional engineers use right now. By the end, you've practiced the full development loop — writing instructions machines can follow, managing what your tools know, running parallel workers. We're skipping the lectures and going straight to building.">
    <!-- END CUSTOMIZATION -->
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge,chrome=1">
    <meta name="viewport"
      content="width=device-width, user-scalable=no, initial-scale=1.0, maximum-scale=1.0, minimum-scale=1.0">
    <meta property="og:type" content="website">
    <!-- UPDATE: Make sure to update all REPO_NAME values for your course repo in the following object.-->
    <meta property="og:url" content="https://tech-at-du.github.io/ACS-4220-AI-Engineering">
    <link rel="stylesheet" href="//unpkg.com/docsify/lib/themes/vue.css">
    <link rel="stylesheet" href="//cdn.jsdelivr.net/npm/docsify-darklight-theme@latest/dist/style.min.css"
      title="docsify-darklight-theme" type="text/css">
    <link rel="stylesheet" href="Web/style.css">
  </head>
  <body>
    <div id="app"></div>
    <!-- UPDATE: Make sure to update NAME, REPO, and NAMESPACE below-->
    <script>
      window.$docsify = {
        logo: '',
        name: 'AI Engineering',
        repo: 'Tech-at-DU/ACS-4220-AI-Engineering',
        themeColor: '#126893',
        formatUpdated: '{MM}/{DD} {HH}:{mm}',
        executeScript: true,
        auto2top: true,
        autoHeader: true,
        loadSidebar: true,
        maxLevel: 6,
        subMaxLevel: 2,
        el: "#app",
        maxLevel: 3,
        loadNavbar: true,
        themeable: {
          readyTransition: true,
          responsiveTables: true
        },
        search: {
          maxAge: 86400000, // Expiration time, the default one day
          paths: "auto",
          placeholder: 'Search class content...',
          noData: 'No Results!',
          depth: 4,
          hideOtherSidebarContent: false,
          // Replace with REPO_NAME
          namespace: 'Syllabus-Template',
        },
        copyCode: {
          buttonText: '📋 Click to Copy',
          errorText: '',
          successText: '✓'
        },
        'flexible-alerts': {
          style: 'flat'
        },
        tabs: {
          persist: true, // default
          sync: true, // default
          theme: 'classic', // default
          tabComments: true, // default
          tabHeadings: true // default
        },
        pagination: {
          previousText: 'Previous Module',
          nextText: 'Next Module',
          crossChapter: true,
          crossChapterText: true
        },
        requestHeaders: {
          'cache-control': 'max-age=180'
        },
        darklightTheme: {
          siteFont: "PT Sans",
          defaultTheme: 'dark',
          codeFontFamily: 'Roboto Mono, Monaco, courier, monospace',
          bodyFontSize: '17px',
          dark: {
            accent: '#4BB1E4',
            toogleBackground: '#F5F6F8',
            background: '#091a28',
            textColor: '#b4b4b4',
            codeTextColor: '#ffffff',
            codeBackgroudColor: '#0e2233',
            borderColor: '#0d2538',
            blockQuoteColour: '#858585',
            highlightColor: '#d22778',
            sidebarSublink: '#b4b4b4',
            codeTypeColor: '#ffffff',
            coverBackground: 'linear-gradient(to left bottom, hsl(118, 100%, 85%) 0%,hsl(181, 100%, 85%) 100%)',
            toogleImage: 'url(https://cdn.jsdelivr.net/npm/docsify-darklight-theme@latest/icons/sun.svg)'
          },
          light: {
            accent: '#087CB8',
            toogleBackground: '#091a28',
            background: '#F5F6F8',
            textColor: '#34495e',
            codeTextColor: '#525252',
            codeBackgroudColor: '#f8f8f8',
            borderColor: 'rgba(0, 0, 0, 0.07)',
            blockQuoteColor: '#858585',
            highlightColor: '#d22778',
            sidebarSublink: '#0D4062',
            codeTypeColor: '#091a28',
            coverBackground: 'linear-gradient(to left bottom, hsl(118, 100%, 85%) 0%,hsl(181, 100%, 85%) 100%)',
            toogleImage: 'url(https://cdn.jsdelivr.net/npm/docsify-darklight-theme@latest/icons/moon.svg)'
          }
        }
      }
    </script>
    <script src="//unpkg.com/docsify-themeable"></script>
    <script src="//unpkg.com/docsify/lib/docsify.min.js"></script>
    <script src="https://cdn.jsdelivr.net/gh/rizdaprasetya/docsify-fix-pageload-scroll@master/index.js"></script>
    <script src="//unpkg.com/docsify/lib/plugins/search.min.js"></script>
    <script src="//unpkg.com/docsify/lib/plugins/emoji.min.js"></script>
    <script src="//unpkg.com/docsify/lib/plugins/external-script.min.js"></script>
    <script src="//unpkg.com/docsify-copy-code@2"></script>
    <script src="https://cdn.jsdelivr.net/npm/docsify-tabs@1"></script>
    <script src="https://unpkg.com/docsify-plugin-flexible-alerts"></script>
    <script src="//unpkg.com/prismjs/components/prism-bash.min.js"></script>
    <script src="//unpkg.com/prismjs/components/prism-handlebars.min.js"></script>
    <script src="//unpkg.com/prismjs/components/prism-javascript.min.js"></script>
    <script src="//unpkg.com/prismjs/components/prism-json.min.js"></script>
    <script src="//unpkg.com/prismjs/components/prism-markdown.min.js"></script>
    <script src="//cdn.jsdelivr.net/npm/docsify-darklight-theme@latest/dist/index.min.js" type="text/javascript">
    </script>
    <script>
      if (typeof navigator.serviceWorker !== 'undefined') {
        navigator.serviceWorker.register('Web/sw.js')
      }
    </script>
  </body>
